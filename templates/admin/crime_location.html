{% extends 'admin/admin_layout.html' %}
{% load static %}
{% block content %}

<div class="container-fluid">
                     <div class="row column_title">
                        <div class="col-md-12">
                           <div class="page_title">
                              <h2>Dashboard</h2>
                           </div>
                        </div>
                     </div>
                   
                   
                     <!-- graph -->
                     <div class="row column2 graph margin_bottom_30">
                        <div class="col-md-12 col-lg-12">
                           <div class="white_shd full">
                              <div class="full graph_head">
                                 <div class="heading1 margin_0">
                                    <h2>Reported Crimes</h2>
                                    
                                 </div>
                              </div>
                              <div class="full graph_revenue">
                                 <div class="row">
                                    <div class="col-md-12">
                                       <div class="content">
                                          <div class="area_chart">
                                      
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
    #map {
        height: 300px;      /* Set map height */
        width: 100%;
        border-radius: 8px;
    }
</style>

<div id="map"></div>

<script>
    // Fetch coordinates from Django context
    var lat = {{ crime.crime_report_latitude }};
    var lng = {{ crime.crime_report_longitude }};

    // Initialize map
    var map = L.map('map').setView([lat, lng], 15); // zoom 15 = street level

    // Load OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
    }).addTo(map);

    // Add marker at crime location
    var marker = L.marker([lat, lng]).addTo(map);

    // Optional: add popup with title
    marker.bindPopup("{{ crime.crime_report_title }}").openPopup();
</script>

                                          </div>
                                       </div>
                                    </div>
                                 </div>
                              </div>
                           </div>
                        </div>
                        
                     </div>
                   
                  
                   
                  </div>
                  {% endblock %}
