{% extends 'citizen/citizen_layout.html' %}
{% load static %}
{% block content %}

<div class="container-fluid">
                     <div class="row column_title">
                        <div class="col-md-12">
                           <div class="page_title">
                              <h2>Dashboard</h2>
                           </div>
                        </div>
                     </div>
                   
                   
                     <!-- graph -->
                     <div class="row column2 graph margin_bottom_30">
                        <div class="col-md-7 col-lg-7">
                           <div class="white_shd full">
                              <div class="full graph_head">
                                 <div class="heading1 margin_0">
                                    <h2>View Crime Laws</h2>
                                 </div>
                              </div>
                              <div class="full graph_revenue">
                                 <div class="row">
                                    <div class="col-md-12">
                                       <div class="content">
                                          <div class="area_chart">
                                           <table class="table">
                                            <tr>
                                                <th>Category</th>
                                                 <th>Crime Law</th>
                                                  <th>Actions</th>
                                            </tr>
                                            {% for l in laws %}
                                            <tr>
                                                 <td>{{l.category_name}}</td>
                                                <td>{{l.crime_law}}</td>
                                                <td>
                                                    <a href="{% url 'edit_crime_law' l.crime_law_id %}"class="btn btn-sm btn-warning">Edit</a>
                                                <a href="{% url 'delete_crime_law' l.crime_law_id %}"class="btn btn-sm btn-danger">Delete</a></td>
                                            </tr>
                                            {% endfor %}
                                           </table>
                                          </div>
                                       </div>
                                    </div>
                                 </div>
                              </div>
                           </div>
                        </div>
                          <div class="col-md-5 col-lg-5">
                           <div class="white_shd full">
                              <div class="full graph_head">
                                 <div class="heading1 margin_0">
                                    <h2>Add Crime Law</h2>
                                 </div>
                              </div>
                              <div class="full graph_revenue">
                                 <div class="row">
                                    <div class="col-md-12">
                                       <div class="content">
                                          <div class="area_chart">
                                            <form action="{% url 'crime_law_save' %}" method="post">

                                          {% csrf_token %}
                                            <div class="form-group">
                                                <label>Category</label>
                                                <select class="form-control" name="categ"
       required>
       <option>Select</option>
       {% for c in clist %}
       <option value="{{c.category_id}}">{{c.category_name}}</option>
       {% endfor %}
       </select>
       <label>Law</label>
       <textarea name="law" class="form-control"></textarea>
                                                
                                            </div>
                                            <input type="submit" class="btn btn-success" value="Save">
                                            <input type="reset" class="btn btn-danger" value="Cancel">
                                            </form>
                                          </div>
                                       </div>
                                    </div>
                                 </div>
                              </div>
                           </div>
                        </div>
                     </div>
                   
                  
                   
                  </div>
                  {% endblock %}
