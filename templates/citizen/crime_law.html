{% extends 'citizen/citizen_layout.html' %}
{% load static %}
{% block content %}

<div class="container-fluid">
                     <div class="row column_title">
                        <div class="col-md-12">
                           <div class="page_title">
                              <h2>Dashboard</h2>
                           </div>
                        </div>
                     </div>
                   
                   
                     <!-- graph -->
                     <div class="row column2 graph margin_bottom_30">
                        <div class="col-md-12 col-lg-12">
                           <div class="white_shd full">
                              <div class="full graph_head">
                                 <div class="heading1 margin_0">
                                    <h2>View Crime Laws</h2>
                                 </div>
                              </div>
                              <div class="full graph_revenue">
                                 <div class="row">
                                    <div class="col-md-12">
                                       <div class="content">
                                          <div class="area_chart">
                                           <table class="table">
                                            <tr>
                                                <th>Category</th>
                                                 <th>Crime Law</th>
                                            </tr>
                                            {% for l in laws %}
                                            <tr>
                                                 <td>{{l.category_name}}</td>
                                                <td>{{l.crime_law}}</td>
                                                
                                            </tr>
                                            {% endfor %}
                                           </table>
                                          </div>
                                       </div>
                                    </div>
                                 </div>
                              </div>
                           </div>
                        </div>
                        </div>
                     </div>
                   
                  
                   
                  </div>
                  {% endblock %}
